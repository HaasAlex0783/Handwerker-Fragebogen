<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeService Partner – Handwerkerbefragung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg: #F5F4F1;
    --surface: #FFFFFF;
    --surface2: #EFEDE9;
    --border: #E0DDD8;
    --border-focus: #1B4A8A;
    --text: #2A2926;
    --text-muted: #7A7872;
    --accent: #1B4A8A;
    --accent-light: #E8EFF8;
    --selected-bg: #E4EDF7;
    --selected-border: #1B4A8A;
    --progress-fill: #1B4A8A;
    --tag-green-bg: #E8F0E6; --tag-green-text: #3A6335;
    --tag-amber-bg: #F5EDD9; --tag-amber-text: #7A5A1E;
    --tag-red-bg: #F5E5E5; --tag-red-text: #7A2F2F;
    --radius: 10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ─── HEADER ─── */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-placeholder {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .logo-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .header-step {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ─── PROGRESS ─── */
  .progress-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .progress-bar-bg {
    height: 2px;
    background: var(--border);
  }
  .progress-bar-fill {
    height: 2px;
    background: var(--progress-fill);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-labels {
    display: flex;
    gap: 0;
    padding: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .progress-labels::-webkit-scrollbar { display: none; }
  .prog-item {
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 0;
    white-space: nowrap;
    padding-right: 20px;
    cursor: pointer;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .prog-item.active { color: var(--text); font-weight: 500; }
  .prog-item.done { color: var(--text-muted); }

  /* ─── MAIN LAYOUT ─── */
  .main {
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  /* ─── SECTION HEADER ─── */
  .section-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: #E4EDF7;
    border: 1px solid #B8CCE8;
    border-radius: 20px;
    padding: 3px 10px;
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
    color: #1B4A8A;
  }
  .section-title {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 2rem;
  }

  /* ─── SCENARIO BOX ─── */
  .scenario-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid #1B4A8A;
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-muted);
  }
  .scenario-box strong { color: var(--text); font-weight: 500; }

  /* ─── QUESTION BLOCKS ─── */
  .q-block { margin-bottom: 1.75rem; }
  .q-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.75rem;
    line-height: 1.5;
  }

  /* ─── OPTIONS (radio / checkbox) ─── */
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-bottom: 6px;
    background: var(--surface);
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .option:hover { background: var(--accent-light); border-color: var(--border-focus); }
  .option.selected {
    background: var(--selected-bg);
    border-color: var(--selected-border);
  }
  .option input[type=radio],
  .option input[type=checkbox] {
    width: 15px; height: 15px;
    accent-color: var(--accent);
    flex-shrink: 0;
    pointer-events: none;
  }
  .option span { font-size: 14px; color: var(--text); }

  /* inline options (1–10 scale) */
  .options-inline { display: flex; flex-wrap: wrap; gap: 6px; }
  .option-pill {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .option-pill:hover { background: var(--accent-light); }
  .option-pill.selected { background: var(--selected-bg); border-color: var(--selected-border); font-weight: 500; }

  /* ─── TEXT INPUTS ─── */
  .text-input, textarea.text-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .text-input:focus, textarea.text-input:focus { border-color: var(--border-focus); }
  .num-input {
    width: 120px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }
  .num-input:focus { border-color: var(--border-focus); }
  .other-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .other-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

  /* ─── E-MAIL VALIDIERUNG ─── */
  .email-wrap { position: relative; }
  .email-wrap .text-input { padding-right: 36px; }
  .email-icon {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .email-hint {
    font-size: 12px;
    margin-top: 5px;
    min-height: 16px;
    transition: color 0.2s;
  }
  .email-hint.valid   { color: #3A6335; }
  .email-hint.invalid { color: #9A4444; }
  .text-input.email-valid   { border-color: #6AA664; }
  .text-input.email-invalid { border-color: #C97070; }

  /* ─── NAVIGATION ─── */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-top: 2.5rem;
    flex-wrap: wrap;
  }
  .btn {
    padding: 11px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: background 0.15s;
  }
  .btn:hover { background: var(--accent-light); }
  .btn-primary {
    background: #1B4A8A;
    color: white;
    border-color: #1B4A8A;
  }
  .btn-primary:hover { background: #143872; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── LOADER ─── */
  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 1.5rem;
  }
  .loader-dots { display: flex; gap: 6px; }
  .loader-dot {
    width: 7px; height: 7px;
    background: #1B4A8A;
    border-radius: 50%;
    animation: dotpulse 1.2s infinite;
    opacity: 0.3;
  }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotpulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
  .loader-text { font-size: 14px; color: var(--text-muted); }

  /* ─── RESULT ─── */
  .result-wrap { padding: 3rem 1.5rem 6rem; max-width: 640px; margin: 0 auto; }
  .result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .result-firma { font-size: 22px; font-weight: 400; letter-spacing: -0.03em; }
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .result-card h3 {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }
  .result-body {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }
  .result-body strong { font-weight: 500; }
  .save-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .save-status { display: flex; align-items: center; gap: 6px; }
  .save-dot { width: 7px; height: 7px; border-radius: 50%; background: #5C8A5C; }
  .save-dot.pending { background: var(--text-muted); }
  .save-dot.error { background: #9A4444; }

  /* ─── HIDDEN ─── */
  .hidden { display: none !important; }

  /* ─── DIVIDER ─── */
  .divider { height: 1px; background: var(--border); margin: 2rem 0; }

  /* ─── MOBILE ─── */
  @media (max-width: 480px) {
    .main { padding: 2rem 1rem 5rem; }
    .section-title { font-size: 18px; }
    .site-header { padding: 0 1rem; }
  }
</style>
</head>

let step = 0;

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════

function isVisible(field) {
  if (!field.conditional) return true;
  const v = answers[field.conditional.field];
  if (Array.isArray(v)) return v.includes(field.conditional.value);
  return v === field.conditional.value;
}
function toggleArr(id, val) {
  if (!answers[id]) answers[id] = [];
  const i = answers[id].indexOf(val);
  if (i > -1) answers[id].splice(i, 1); else answers[id].push(val);
  render();
}
function isValidEmail(v) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test((v||'').trim());
}

function setVal(id, val) { answers[id] = val; render(); }
function setValText(id, val) {
  answers[id] = val;
  if (id === 'email') {
    const v = val.trim();
    const valid = isValidEmail(v);
    const empty = v === '';

    const inp = document.getElementById('email-input');
    const hint = document.getElementById('email-hint');
    const icon = document.getElementById('email-icon');
    const btn  = document.getElementById('weiter-btn');
    const btntxt = document.getElementById('weiter-hint');

    if (inp) {
      inp.className = 'text-input' + (empty ? '' : valid ? ' email-valid' : ' email-invalid');
    }
    if (hint) {
      hint.textContent = empty ? '' : valid ? 'Gültige E-Mail-Adresse' : 'Bitte eine gültige E-Mail eingeben (z.B. name@firma.de)';
      hint.className = 'email-hint' + (empty ? '' : valid ? ' valid' : ' invalid');
    }
    if (icon) {
      icon.innerHTML = empty ? '' : valid
        ? '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#6AA664"/><polyline points="4.5,8.5 7,11 11.5,5.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#C97070"/><line x1="5.5" y1="5.5" x2="10.5" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="10.5" y1="5.5" x2="5.5" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>';
    }
    if (btn) {
      btn.style.opacity = valid ? '1' : '0.4';
      btn.style.cursor  = valid ? 'pointer' : 'not-allowed';
      btn.onclick = valid ? () => { step++; render(); } : () => {};
    }
    if (btntxt) {
      btntxt.style.display = valid ? 'none' : 'inline';
    }
  }
}

function buildSummary() {
  const lines = [];
  STEPS.forEach(s => {
    s.fields.forEach(f => {
      if (!isVisible(f)) return;
      const v = answers[f.id];
      if (!v || v.length === 0) return;
      lines.push(`${f.label}: ${Array.isArray(v) ? v.join(', ') : v}`);
      const ok = answers[f.id + '_other'];
      if (ok) lines.push(`${f.label} (Sonstiges): ${ok}`);
    });
  });
  return lines.join('\n');
}

function flatAnswers() {
  const obj = { timestamp: new Date().toISOString() };
  STEPS.forEach(s => {
    s.fields.forEach(f => {
      const v = answers[f.id];
      obj[f.id] = Array.isArray(v) ? v.join(', ') : (v || '');
      if (answers[f.id + '_other']) obj[f.id + '_other'] = answers[f.id + '_other'];
    });
  });
  obj['ki_auswertung'] = aiText;
  return obj;
}

function buildEmailText() {
  const lines = [];
  STEPS.forEach(s => {

async function sendEmail() {
  if (!isValidEmail(answers.email)) {
    alert('Bitte eine gültige E-Mail-Adresse eintragen.');
    phase = 'form'; step = 0; render();
    return;
  }
  emailStatus = 'sending';
  render();

  const flat = flatAnswers();
  const templateParams = {
    to_email:        EMPFAENGER_EMAIL,
    firma:           answers.firma        || '–',
    ansprechpartner: answers.ansprechpartner || '–',
    email:           answers.email        || '–',
    telefon:         answers.telefon      || '–',
    ort:             answers.ort          || '–',
    gewerk:          (answers.gewerk || []).join(', ') || '–',
    datum:           new Date().toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric', hour:'2-digit',minute:'2-digit'}),
    zusammenfassung: buildEmailText(),
    json_data:       JSON.stringify(flat, null, 2),
  };

  if (EMAILJS_PUBLIC_KEY === 'DEIN_PUBLIC_KEY') {
    // Demo-Modus: kein echter Versand
    await new Promise(r => setTimeout(r, 1200));
    emailStatus = 'sent';
    render();
    return;
  }

  try {
    emailjs.init(EMAILJS_PUBLIC_KEY);
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
    emailStatus = 'sent';
  } catch (e) {
    console.error('EmailJS Fehler:', e);
    emailStatus = 'error';
  }
  render();
}

async function runAI() {
  phase = 'loading';
  render();
  const summary = buildSummary();
  const prompt = `Du bist ein Unternehmensberater für ein Handwerker-Vermittlungsportal. 
Ein Handwerksbetrieb hat folgenden Fragebogen ausgefüllt:

${summary}

Erstelle eine strukturierte Auswertung auf Deutsch mit diesen Abschnitten:
1. **Betriebsprofil** (2–3 Sätze Zusammenfassung)
2. **Potenzial für Kleinaufträge** (Eignung für das Plattformmodell, Chancen)
3. **Herausforderungen & Einwände** (mögliche Hürden)
4. **Empfehlung** (konkrete nächste Schritte)
5. **Interessens-Score** (Zahl von 1–10, wie geeignet und interessiert dieser Betrieb für das Plattformmodell ist, mit kurzer Begründung)

Sei präzise, praxisnah und unternehmerisch. Antworte in Markdown.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    aiText = data.content?.[0]?.text || 'Keine Auswertung verfügbar.';
  } catch (e) {
    aiText = 'Fehler bei der KI-Auswertung. Bitte erneut versuchen.';
  }

  phase = 'result';
  saveStatus = 'pending';
  render();
  await saveToSheets(flatAnswers());
}

function md2html(t) {
  return t
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<p style="font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin:1.25rem 0 0.5rem">$1</p>')
    .replace(/^## (.+)$/gm, '<p style="font-size:15px;font-weight:500;margin:1.25rem 0 0.4rem">$1</p>')
    .replace(/^# (.+)$/gm, '<p style="font-size:15px;font-weight:500;margin:1.25rem 0 0.4rem">$1</p>')
    .replace(/^(\d+)\. \*\*(.+?)\*\*(.*)$/gm, '<p style="margin:1rem 0 0.3rem"><strong>$1. $2</strong>$3</p>')
    .replace(/^- (.+)$/gm, '<p style="margin:0.25rem 0;padding-left:1rem;color:var(--text-muted)">– $1</p>')
    .replace(/\n\n/g, '<br>');
}

      : v ? '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#C97070"/><line x1="5.5" y1="5.5" x2="10.5" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="10.5" y1="5.5" x2="5.5" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>' : '';
    h += `<div class="email-wrap">
      <input id="email-input" class="text-input${validClass}" type="email" tabindex="${t++}" placeholder="name@firma.de" value="${emailVal}" oninput="setValText('email',this.value)" onchange="setValText('email',this.value)" autocomplete="email">
      <div class="email-icon" id="email-icon">${iconHTML}</div>
    </div>
    <div class="email-hint ${hintClass}" id="email-hint">${hintText}</div>`;
  } else if (f.type === 'text') {
    h += `<input class="text-input" type="text" tabindex="${t++}" placeholder="${f.placeholder || ''}" value="${(v || '').replace(/"/g, '&quot;')}" oninput="setValText('${f.id}',this.value)" onchange="setValText('${f.id}',this.value)">`;
  } else if (f.type === 'textarea') {
    h += `<textarea class="text-input" rows="3" tabindex="${t++}" placeholder="${f.placeholder || ''}" oninput="setValText('${f.id}',this.value)">${v || ''}</textarea>`;
  } else if (f.type === 'number') {
    h += `<input class="num-input" type="number" tabindex="${t++}" placeholder="${f.placeholder || ''}" value="${v || ''}" oninput="setValText('${f.id}',this.value)" onchange="setValText('${f.id}',this.value)">`;
  } else if (f.type === 'radio') {
    if (f.inline) {
      h += `<div class="options-inline">`;
      f.options.forEach(o => {
        const sel = v === o;
        h += `<div class="option-pill${sel ? ' selected' : ''}" tabindex="${t++}" onclick="setVal('${f.id}','${o}')" onkeydown="if(event.key==='Enter'||event.key===' ')setVal('${f.id}','${o}')">${o}</div>`;
      });
      h += `</div>`;
    } else {
      f.options.forEach(o => {
        const sel = v === o;
        h += `<div class="option${sel ? ' selected' : ''}" tabindex="${t++}" onclick="setVal('${f.id}','${o.replace(/'/g,"\\'")}')" onkeydown="if(event.key==='Enter'||event.key===' ')setVal('${f.id}','${o.replace(/'/g,"\\'")}')">
          <input type="radio" ${sel ? 'checked' : ''} readonly tabindex="-1"><span>${o}</span></div>`;
      });
    }
  } else if (f.type === 'checkbox') {
    const arr = v || [];
    f.options.forEach(o => {
      const sel = arr.includes(o);
      h += `<div class="option${sel ? ' selected' : ''}" tabindex="${t++}" onclick="toggleArr('${f.id}','${o.replace(/'/g,"\\'")}')" onkeydown="if(event.key==='Enter'||event.key===' ')toggleArr('${f.id}','${o.replace(/'/g,"\\'")}')">
        <input type="checkbox" ${sel ? 'checked' : ''} readonly tabindex="-1"><span>${o}</span></div>`;
    });
    if (f.other) {
      const ok = answers[f.id + '_other'] || '';
      h += `<div class="other-row"><span class="other-label">Sonstiges:</span>
        <input class="text-input" type="text" tabindex="${t++}" placeholder="..." value="${ok.replace(/"/g,'&quot;')}" oninput="setValText('${f.id}_other',this.value)"></div>`;
    }
  }
  h += `</div>`;
  return { html: h, tabs: t };
}

function render() {
  const app = document.getElementById('app');
  const headerStep = document.getElementById('header-step');
  const progressFill = document.getElementById('progress-fill');
  const progressLabels = document.getElementById('progress-labels');

  // Progress labels
  progressLabels.innerHTML = STEPS.map((s, i) =>
    `<div class="prog-item${i === step ? ' active' : i < step ? ' done' : ''}" onclick="if(${i}<${step}){step=${i};render()}">${s.label}</div>`
  ).join('');

  if (phase === 'loading') {
    headerStep.textContent = 'Auswertung läuft...';
    progressFill.style.width = '100%';
    app.innerHTML = `<div class="loader-wrap">
      <div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
      <div class="loader-text">KI analysiert die Antworten…</div>
    </div>`;
    return;
  }

  if (phase === 'result') {
    headerStep.textContent = 'Auswertung';
    progressFill.style.width = '100%';

    // Score aus AI-Text extrahieren
    const scoreMatch = aiText.match(/(\d+)\s*\/\s*10|Score[^0-9]*(\d+)/);
    const scoreNum = scoreMatch ? parseInt(scoreMatch[1] || scoreMatch[2]) : null;
    let scoreBadgeHTML = '';
    if (scoreNum !== null) {
      const col = scoreNum >= 7 ? '#5C8A5C' : scoreNum >= 4 ? '#9A7A3A' : '#9A4444';
      scoreBadgeHTML = `<div class="score-badge"><div class="score-dot" style="background:${col}"></div>Score ${scoreNum}/10</div>`;
    }

    const saveLabel = saveStatus === 'saved' ? 'In Google Sheets gespeichert' : saveStatus === 'error' ? 'Speichern fehlgeschlagen' : 'Wird gespeichert…';
    const dotClass = saveStatus === 'saved' ? 'save-dot' : saveStatus === 'error' ? 'save-dot error' : 'save-dot pending';

    app.innerHTML = `<div class="result-wrap">
      <div class="result-header">
        <div class="result-firma">${answers.firma || 'Betrieb'}</div>
        ${scoreBadgeHTML}
      </div>
      <div class="save-row">
        <div class="save-status"><div class="${dotClass}"></div><span>${saveLabel}</span></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" onclick="exportTxt()">Export .txt</button>
          <button class="btn" onclick="copyEmail()">E-Mail kopieren</button>
        </div>
      </div>
      <div class="result-card">
        <h3>KI-Auswertung</h3>
        <div class="result-body">${md2html(aiText)}</div>
      </div>
      <div class="divider"></div>
      <button class="btn" onclick="step=0;answers={};phase='form';aiText='';emailStatus='idle';render()">Neuen Fragebogen starten</button>
    </div>`;
    return;
  }

  if (phase === 'confirm') {
    headerStep.textContent = 'Absenden';
    progressFill.style.width = '100%';

    const emailIcon = emailStatus === 'sent'
      ? `<div style="width:52px;height:52px;border-radius:50%;background:#E8EFF8;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
           <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1B4A8A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
         </div>`
      : emailStatus === 'error'
      ? `<div style="width:52px;height:52px;border-radius:50%;background:#F5E5E5;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
           <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9A4444" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
         </div>`
      : `<div style="width:52px;height:52px;border-radius:50%;background:#E8EFF8;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
           <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1B4A8A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
         </div>`;

    let confirmContent = '';
    if (emailStatus === 'idle' || emailStatus === 'sending') {
      confirmContent = `
        ${emailIcon}
        <div style="font-size:18px;font-weight:400;letter-spacing:-0.02em;margin-bottom:0.5rem">Fragebogen absenden</div>
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:1.75rem;line-height:1.6">
          Der ausgefüllte Fragebogen wird an<br>
          <strong style="color:var(--text)">Kontakt@HomeService-Partner.de</strong> gesendet.<br>
          Das Format enthält eine lesbare Zusammenfassung<br>und alle Rohdaten als JSON.
        </div>
        <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;text-align:left">
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em">Zusammenfassung</div>
          <div style="font-size:14px;line-height:1.6">
            <strong>${answers.firma || '–'}</strong> &middot; ${answers.ansprechpartner || '–'}<br>
            ${(answers.gewerk || []).join(', ') || '–'} &middot; ${answers.ort || '–'}<br>
            <span style="color:var(--text-muted)">${answers.email || ''} ${answers.telefon ? '· ' + answers.telefon : ''}</span>
          </div>
        </div>
        <div class="nav-row" style="justify-content:center">
          <button class="btn" onclick="phase='form';step=0;render()">Zurück</button>
          <button class="btn btn-primary" onclick="sendEmail()"
            ${emailStatus === 'sending' || !isValidEmail(answers.email) ? 'disabled' : ''}
            style="${!isValidEmail(answers.email) ? 'opacity:0.4;cursor:not-allowed' : ''}">
            ${emailStatus === 'sending' ? 'Wird gesendet…' : 'Jetzt absenden'}
          </button>
        </div>
        ${!isValidEmail(answers.email) ? `<div style="text-align:center;margin-top:0.75rem;font-size:13px;color:#9A4444">
          Bitte zuerst eine gültige E-Mail-Adresse im Kontaktbereich eintragen.
        </div>` : ''}` ;
    } else if (emailStatus === 'sent') {
      confirmContent = `
        ${emailIcon}
        <div style="font-size:18px;font-weight:400;letter-spacing:-0.02em;margin-bottom:0.5rem">Vielen Dank!</div>
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:1.75rem;line-height:1.6">
          Der Fragebogen wurde erfolgreich versendet.<br>
          <strong style="color:var(--text)">HomeService Partner</strong> wird sich bei Ihnen melden.
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:1.5rem">
          Gesendet an: Kontakt@HomeService-Partner.de
        </div>`;
    } else {
      confirmContent = `
        ${emailIcon}
        <div style="font-size:18px;font-weight:400;letter-spacing:-0.02em;margin-bottom:0.5rem">Fehler beim Senden</div>
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:1.75rem;line-height:1.6">
          Der Fragebogen konnte nicht gesendet werden.<br>
          Bitte versuche es erneut oder kontaktiere uns direkt.
        </div>
        <div class="nav-row" style="justify-content:center">
          <button class="btn btn-primary" onclick="emailStatus='idle';render()">Erneut versuchen</button>
        </div>`;
    }

    app.innerHTML = `<div class="main" style="text-align:center;padding-top:3rem">${confirmContent}</div>`;
    return;
  }

  // FORM
  const s = STEPS[step];
  const pct = Math.round((step / STEPS.length) * 100);
  progressFill.style.width = pct + '%';
  headerStep.textContent = `Schritt ${step + 1} / ${STEPS.length}`;
  let tabIdx = 1;

  let html = `<div class="main">
    <div class="section-badge">${step + 1} / ${STEPS.length} · ${s.label}</div>
    <div class="section-title">${s.title}</div>`;

  if (s.scenario) {
    html += `<div class="scenario-box">
      Ein Kunde gibt Ihnen alle notwendigen Informationen (Beschreibung, Fotos usw.), sodass <strong>keine Rückfragen notwendig sind</strong>.
      Der Kunde möchte einen kleinen Auftrag von etwa <strong>1–2 Stunden</strong> vergeben.
      Der Auftragswert läge bei ungefähr <strong>100 bis 150 Euro</strong>.
      Sie müssten <strong>kein Angebot schreiben</strong> und könnten direkt zum Kunden fahren.
      Der Kunde kommt über eine <strong>Vermittlung</strong> zu Ihnen.
    </div>`;
  }

  s.fields.forEach(f => { 
    const result = renderField(f, tabIdx);
    html += result.html;
    tabIdx = result.tabs;
  });

  html += `<div class="nav-row">`;
  if (step > 0) html += `<button class="btn" tabindex="${tabIdx++}" onclick="step--;render()">Zurück</button>`;
  if (step < STEPS.length - 1) {
    const isContactStep = s.id === 'contact';
    const emailOk = isValidEmail(answers.email);
    const blocked = isContactStep && !emailOk;
    html += `<button id="weiter-btn" class="btn btn-primary" tabindex="${tabIdx++}"
      onclick="if(${blocked}){return;}step++;render();"
      style="${blocked ? 'opacity:0.4;cursor:not-allowed' : ''}">Weiter</button>`;
    if (isContactStep) html += `<span id="weiter-hint" style="align-self:center;font-size:13px;color:#9A4444;margin-left:4px;${emailOk ? 'display:none' : ''}">Bitte gültige E-Mail eintragen</span>`;
  } else {
    html += `<button class="btn btn-primary" tabindex="${tabIdx++}" onclick="phase='confirm';render()">Fragebogen absenden →</button>`;
  }
  html += `</div></div>`;
  app.innerHTML = html;
}

render();
</script>
</body>
</html>
